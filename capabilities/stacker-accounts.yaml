naftiko: 1.0.0-alpha2
info:
  label: Stacker API — Accounts
  description: 'Stacker API — Accounts. 1 operations. Lead operation: List Accounts. Self-contained Naftiko capability covering
    one Stacker business surface.'
  tags:
  - Stacker
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STACKER_API_KEY: STACKER_API_KEY
capability:
  consumes:
  - type: http
    namespace: stacker-accounts
    baseUri: https://api.go.stackerhq.com
    description: Stacker API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: api-external-accounts
      path: /api/external/accounts/
      operations:
      - name: listaccounts
        method: GET
        description: List Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Integration-Key
      value: '{{env.STACKER_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stacker-accounts-rest
    port: 8080
    description: REST adapter for Stacker API — Accounts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/external/accounts
      name: api-external-accounts
      description: REST surface for api-external-accounts.
      operations:
      - method: GET
        name: listaccounts
        description: List Accounts
        call: stacker-accounts.listaccounts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stacker-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stacker API — Accounts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-accounts
      description: List Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stacker-accounts.listaccounts
      outputParameters:
      - type: object
        mapping: $.
