naftiko: "1.0.0-alpha1"

info:
  label: "Stacker API"
  description: "Programmatic access to objects, records, accounts, and stacks in the Stacker no-code platform."
  tags:
    - No-Code
    - Records
    - Application Development
    - Portals
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STACKER_INTEGRATION_KEY: STACKER_INTEGRATION_KEY

capability:
  consumes:
    - type: http
      namespace: stacker
      baseUri: https://api.go.stackerhq.com
      description: "Stacker no-code platform API for managing records, objects, and accounts."
      authentication:
        type: apikey
        key: X-Integration-Key
        value: "{{STACKER_INTEGRATION_KEY}}"
        placement: header
      resources:
        - name: hello
          path: /api/external/hello/
          description: "Health check endpoint"
          operations:
            - name: get-hello
              method: GET
              description: "Health check - verify API connectivity"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: accounts
          path: /api/external/accounts/
          description: "Manage Stacker accounts"
          operations:
            - name: list-accounts
              method: GET
              description: "List all accounts accessible by the integration key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: objects
          path: /api/external/objects/
          description: "List objects (tables) in a stack"
          operations:
            - name: list-objects
              method: GET
              description: "List all objects for an account and stack"
              inputParameters:
                - name: X-Account-Id
                  in: header
                  type: string
                  required: true
                  description: "The Stacker account ID"
                - name: X-Stack-Id
                  in: header
                  type: string
                  required: true
                  description: "The Stacker stack ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: records
          path: /api/external/objects/{object_sid}/search/
          description: "Search and paginate records within an object"
          operations:
            - name: search-records
              method: POST
              description: "Search records in an object with filtering and pagination"
              inputParameters:
                - name: object_sid
                  in: path
                  type: string
                  required: true
                  description: "The object SID"
                - name: X-Account-Id
                  in: header
                  type: string
                  required: true
                  description: "The Stacker account ID"
                - name: X-Stack-Id
                  in: header
                  type: string
                  required: true
                  description: "The Stacker stack ID"
              body:
                type: json
                data:
                  search: "{{tools.search}}"
                  count: "{{tools.count}}"
                  start: "{{tools.start}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-record
              method: POST
              description: "Create a new record in an object"
              inputParameters:
                - name: object_sid
                  in: path
                  type: string
                  required: true
                  description: "The object SID"
                - name: X-Account-Id
                  in: header
                  type: string
                  required: true
                - name: X-Stack-Id
                  in: header
                  type: string
                  required: true
              body:
                type: json
                data:
                  fields: "{{tools.fields}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-record
              method: GET
              description: "Retrieve a single record by SID"
              inputParameters:
                - name: object_sid
                  in: path
                  type: string
                  required: true
                - name: record_sid
                  in: path
                  type: string
                  required: true
                - name: X-Account-Id
                  in: header
                  type: string
                  required: true
                - name: X-Stack-Id
                  in: header
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-record
              method: PATCH
              description: "Partially update a record"
              inputParameters:
                - name: object_sid
                  in: path
                  type: string
                  required: true
                - name: record_sid
                  in: path
                  type: string
                  required: true
                - name: X-Account-Id
                  in: header
                  type: string
                  required: true
                - name: X-Stack-Id
                  in: header
                  type: string
                  required: true
              body:
                type: json
                data:
                  fields: "{{tools.fields}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-record
              method: DELETE
              description: "Delete a record by SID"
              inputParameters:
                - name: object_sid
                  in: path
                  type: string
                  required: true
                - name: record_sid
                  in: path
                  type: string
                  required: true
                - name: X-Account-Id
                  in: header
                  type: string
                  required: true
                - name: X-Stack-Id
                  in: header
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: bulk-upsert-records
              method: POST
              description: "Create or update up to 1000 records in a single request"
              inputParameters:
                - name: object_sid
                  in: path
                  type: string
                  required: true
                - name: X-Account-Id
                  in: header
                  type: string
                  required: true
                - name: X-Stack-Id
                  in: header
                  type: string
                  required: true
              body:
                type: json
                data:
                  records: "{{tools.records}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: stacker-rest
      resources:
        - path: /v1/accounts
          name: accounts
          description: "Stacker accounts"
          operations:
            - method: GET
              name: list-accounts
              description: "List accounts"
              call: "stacker.list-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/objects
          name: objects
          description: "Stacker objects"
          operations:
            - method: GET
              name: list-objects
              description: "List objects in a stack"
              call: "stacker.list-objects"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/objects/{object_sid}/records
          name: records
          description: "Records within an object"
          operations:
            - method: POST
              name: search-records
              description: "Search records"
              call: "stacker.search-records"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/objects/{object_sid}/records/{record_sid}
          name: record
          description: "Single record operations"
          operations:
            - method: GET
              name: get-record
              description: "Get a record"
              call: "stacker.get-record"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-record
              description: "Update a record"
              call: "stacker.update-record"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-record
              description: "Delete a record"
              call: "stacker.delete-record"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: stacker-mcp
      transport: http
      tools:
        - name: list-accounts
          description: "List all Stacker accounts accessible by the integration key"
          hints:
            readOnly: true
          call: "stacker.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-objects
          description: "List all objects (tables) in a Stacker stack"
          hints:
            readOnly: true
          call: "stacker.list-objects"
          with:
            X-Account-Id: "tools.account_id"
            X-Stack-Id: "tools.stack_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-records
          description: "Search and filter records in a Stacker object"
          hints:
            readOnly: true
            openWorld: true
          call: "stacker.search-records"
          with:
            object_sid: "tools.object_sid"
            search: "tools.search"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-record
          description: "Retrieve a single Stacker record by SID"
          hints:
            readOnly: true
          call: "stacker.get-record"
          with:
            object_sid: "tools.object_sid"
            record_sid: "tools.record_sid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-record
          description: "Create a new record in a Stacker object"
          hints:
            readOnly: false
          call: "stacker.create-record"
          with:
            object_sid: "tools.object_sid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-record
          description: "Update fields on an existing Stacker record"
          hints:
            readOnly: false
            idempotent: true
          call: "stacker.update-record"
          with:
            object_sid: "tools.object_sid"
            record_sid: "tools.record_sid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-record
          description: "Delete a Stacker record by SID"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "stacker.delete-record"
          with:
            object_sid: "tools.object_sid"
            record_sid: "tools.record_sid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: bulk-upsert-records
          description: "Create or update up to 1000 records in bulk"
          hints:
            readOnly: false
          call: "stacker.bulk-upsert-records"
          with:
            object_sid: "tools.object_sid"
          outputParameters:
            - type: object
              mapping: "$."
